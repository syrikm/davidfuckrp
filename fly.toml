# Fly.io configuration — copy this file as-is, then run:
#   fly launch --copy-config --no-deploy --name <your-app-name>
#   fly volumes create data --size 1 --region sin
#   fly secrets set PROXY_API_KEY=$(openssl rand -hex 32)
#   fly deploy
# Docs: https://fly.io/docs/reference/configuration/

# app = "davidfuckrp"          # uncomment & set after `fly launch`
primary_region = "sin"          # Singapore. Change to hkg / nrt / fra / iad / lhr...
kill_signal    = "SIGINT"
kill_timeout   = "30s"          # give the gateway 30s to drain SSE streams

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV        = "production"
  PORT            = "8080"
  STORAGE_BACKEND = "local"
  # PROXY_API_KEY is set via `fly secrets set`, NOT here

[[mounts]]
  source      = "data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = "stop"     # scale to zero when idle
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  # No idle timeout — long AI completions can take minutes
  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "20s"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"   # bump to 1024mb if model registry grows large
